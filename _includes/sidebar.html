<div class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <h1>
        <a href="/">
          {{ site.title }}
        </a>
      </h1>
      <p class="lead">{{ site.description }}</p>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-nav-item{% if page.url == '/' %} active{% endif %}" href="/">Home</a>
      <a class="sidebar-nav-item{% if page.url contains '/posts' %} active{% endif %}" href="/posts">Posts</a>
      <a class="sidebar-nav-item{% if page.url contains '/about' %} active{% endif %}" href="/about">About</a>
    </nav>

    <p>&copy; {{ site.title }} {{ "now" | date: "%Y" }}</p>
  </div>
</div>
